<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIR Blackbox — Compare Runs</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }

.header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid #1e1e2e; background: #0d0d14; }
.header h1 { font-size: 18px; color: #fff; }
.header h1 span { color: #3b82f6; }
.back-link { color: #3b82f6; text-decoration: none; font-size: 13px; }
.back-link:hover { text-decoration: underline; }

.container { max-width: 1200px; margin: 0 auto; padding: 24px; }

/* Selectors */
.selectors { display: grid; grid-template-columns: 1fr auto 1fr; gap: 16px; align-items: end; margin-bottom: 24px; }
@media (max-width: 768px) { .selectors { grid-template-columns: 1fr; } }
.selector-group { }
.selector-group label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.selector-group select { width: 100%; padding: 10px 12px; background: #111118; border: 1px solid #1e1e2e; border-radius: 6px; color: #ddd; font-size: 13px; cursor: pointer; }
.selector-group select:focus { outline: none; border-color: #3b82f6; }
.vs-label { font-size: 16px; font-weight: 700; color: #333; text-align: center; padding-bottom: 10px; }
.compare-btn { display: block; width: 100%; padding: 10px; margin-top: 8px; border-radius: 6px; border: none; background: #3b82f6; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
.compare-btn:hover { background: #2563eb; }
.compare-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

/* Diff layout */
.diff-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 768px) { .diff-grid { grid-template-columns: 1fr; } }

.diff-col-header { font-size: 14px; font-weight: 700; padding: 10px 14px; border-radius: 8px 8px 0 0; }
.diff-col-header.left { background: #1a1a2e; color: #8b5cf6; border: 1px solid #2d2d4e; border-bottom: none; }
.diff-col-header.right { background: #1a2332; color: #3b82f6; border: 1px solid #1e3a5f; border-bottom: none; }

/* Summary comparison */
.compare-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.summary-side { background: #111118; border: 1px solid #1e1e2e; border-radius: 8px; padding: 16px; }
.summary-side h3 { font-size: 13px; color: #888; margin-bottom: 12px; }
.summary-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid #141420; }
.summary-row:last-child { border-bottom: none; }
.summary-row .label { color: #888; }
.summary-row .value { color: #ddd; font-weight: 600; font-family: 'SF Mono', monospace; }
.summary-row .value.better { color: #22c55e; }
.summary-row .value.worse { color: #ef4444; }
.summary-row .value.same { color: #888; }

/* Delta bar */
.delta-section { margin-bottom: 24px; }
.delta-section h3 { font-size: 14px; color: #fff; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #1e1e2e; }
.delta-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
.delta-card { background: #111118; border: 1px solid #1e1e2e; border-radius: 8px; padding: 14px; text-align: center; }
.delta-card .delta-val { font-size: 20px; font-weight: 700; }
.delta-card .delta-label { font-size: 11px; color: #666; margin-top: 4px; }
.delta-val.positive { color: #ef4444; }
.delta-val.negative { color: #22c55e; }
.delta-val.neutral { color: #888; }

/* Steps diff */
.steps-diff { margin-bottom: 24px; }
.steps-diff h3 { font-size: 14px; color: #fff; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #1e1e2e; }
.diff-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 8px; }
.diff-cell { background: #111118; border: 1px solid #1e1e2e; border-radius: 6px; padding: 10px 12px; font-size: 12px; min-height: 60px; }
.diff-cell.changed { border-color: #eab308; background: #1a1a10; }
.diff-cell.added { border-color: #22c55e; background: #0d1a0d; }
.diff-cell.removed { border-color: #ef4444; background: #1a0d0d; }
.diff-cell.same { opacity: 0.6; }
.diff-cell .cell-action { font-weight: 600; color: #ddd; margin-bottom: 4px; }
.diff-cell .cell-detail { color: #888; font-family: 'SF Mono', monospace; font-size: 11px; }
.diff-cell .cell-badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 9px; font-weight: 700; text-transform: uppercase; margin-left: 6px; }
.badge-new { background: #0d2a0d; color: #22c55e; }
.badge-removed { background: #2a0d0d; color: #ef4444; }
.badge-changed { background: #2a2a0d; color: #eab308; }

/* Empty/loading */
.empty-state { text-align: center; padding: 60px 20px; color: #555; }
.empty-state h2 { font-size: 18px; color: #888; margin-bottom: 12px; }
.empty-state p { font-size: 14px; line-height: 1.6; }
.error-banner { background: #2a0d0d; border: 1px solid #3f1a1a; border-radius: 6px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: #ef4444; }
</style>
</head>
<body>

<div class="header">
  <h1>AIR <span>Blackbox</span> — Compare Runs</h1>
  <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
</div>

<div class="container">
  <div class="selectors">
    <div class="selector-group">
      <label>Run A (Baseline)</label>
      <select id="selectA"><option value="">Loading episodes...</option></select>
    </div>
    <div class="vs-label">vs</div>
    <div class="selector-group">
      <label>Run B (Comparison)</label>
      <select id="selectB"><option value="">Loading episodes...</option></select>
    </div>
  </div>
  <button class="compare-btn" id="compareBtn" onclick="runComparison()">Compare Runs</button>

  <div id="results" style="margin-top:24px;">
    <div class="empty-state">
      <h2>Select two episodes to compare</h2>
      <p>Pick a baseline run and a comparison run, then click Compare to see the differences in steps, tokens, cost, trust scores, and policy decisions.</p>
    </div>
  </div>
</div>

<script>
const API_BASE = 'http://localhost:8100';
let episodes = [];

async function init() {
  try {
    const res = await fetch(`${API_BASE}/episodes`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    episodes = await res.json();
    episodes.sort((a, b) => {
      const ta = a.created_at || a.timestamp || a.start_time || '';
      const tb = b.created_at || b.timestamp || b.start_time || '';
      return tb.localeCompare(ta);
    });
    populateSelects();
  } catch (err) {
    document.getElementById('results').innerHTML =
      `<div class="error-banner">Cannot reach Episode Store at ${API_BASE}. Is the stack running?</div>`;
  }
}

function populateSelects() {
  const selA = document.getElementById('selectA');
  const selB = document.getElementById('selectB');
  const opts = episodes.map((ep, i) => {
    const id = ep.id || ep.episode_id || i;
    const title = ep.title || ep.name || ep.agent_name || `Episode #${id}`;
    const time = ep.created_at || ep.timestamp || '';
    const timeStr = time ? ` (${new Date(time).toLocaleString()})` : '';
    return `<option value="${id}">${escapeHtml(title)}${timeStr}</option>`;
  }).join('');
  selA.innerHTML = '<option value="">— Select baseline —</option>' + opts;
  selB.innerHTML = '<option value="">— Select comparison —</option>' + opts;
  if (episodes.length >= 2) { selA.selectedIndex = 1; selB.selectedIndex = 2; }
}

async function getEpisode(id) {
  try {
    const res = await fetch(`${API_BASE}/episodes/${id}`);
    if (res.ok) return await res.json();
  } catch {}
  return episodes.find(e => (e.id || e.episode_id) == id) || episodes[parseInt(id)] || null;
}

async function runComparison() {
  const idA = document.getElementById('selectA').value;
  const idB = document.getElementById('selectB').value;
  if (!idA || !idB) { alert('Please select two episodes to compare.'); return; }
  const results = document.getElementById('results');
  results.innerHTML = '<div style="text-align:center;padding:40px;color:#555;">Comparing...</div>';
  const [epA, epB] = await Promise.all([getEpisode(idA), getEpisode(idB)]);
  if (!epA || !epB) { results.innerHTML = '<div class="error-banner">Could not load one or both episodes.</div>'; return; }
  renderComparison(epA, epB);
}

function renderComparison(a, b) {
  const results = document.getElementById('results');
  const titleA = a.title || a.name || a.agent_name || `Episode #${a.id || a.episode_id}`;
  const titleB = b.title || b.name || b.agent_name || `Episode #${b.id || b.episode_id}`;
  const stepsA = a.steps || a.events || [];
  const stepsB = b.steps || b.events || [];
  const tokensA = a.total_tokens || a.tokens || stepsA.reduce((s, x) => s + (x.tokens || 0), 0);
  const tokensB = b.total_tokens || b.tokens || stepsB.reduce((s, x) => s + (x.tokens || 0), 0);
  const costA = a.total_cost != null ? a.total_cost : stepsA.reduce((s, x) => s + (x.cost || 0), 0);
  const costB = b.total_cost != null ? b.total_cost : stepsB.reduce((s, x) => s + (x.cost || 0), 0);
  const trustA = a.trust_score != null ? a.trust_score : null;
  const trustB = b.trust_score != null ? b.trust_score : null;
  const blockedA = a.blocked || stepsA.some(s => s.action === 'block' || s.status === 'blocked');
  const blockedB = b.blocked || stepsB.some(s => s.action === 'block' || s.status === 'blocked');
  const tokenDelta = tokensB - tokensA;
  const costDelta = costB - costA;
  const stepDelta = stepsB.length - stepsA.length;

  let html = '';
  html += `<div class="delta-section"><h3>Delta Summary</h3><div class="delta-cards">`;
  html += deltaCard('Steps', stepDelta, '', true);
  html += deltaCard('Tokens', tokenDelta, '', true);
  html += deltaCard('Cost', costDelta, '$', true);
  if (trustA != null && trustB != null) { html += deltaCard('Trust', trustB - trustA, '', false); }
  html += `<div class="delta-card">
    <div class="delta-val ${blockedA === blockedB ? 'neutral' : 'positive'}">${blockedA ? 'BLOCKED' : 'OK'} → ${blockedB ? 'BLOCKED' : 'OK'}</div>
    <div class="delta-label">Status</div>
  </div>`;
  html += `</div></div>`;

  html += `<div class="compare-summary">`;
  html += summaryPanel(titleA, 'A (Baseline)', stepsA, tokensA, costA, trustA, blockedA);
  html += summaryPanel(titleB, 'B (Comparison)', stepsB, tokensB, costB, trustB, blockedB);
  html += `</div>`;

  html += `<div class="steps-diff"><h3>Steps Comparison</h3>`;
  const maxSteps = Math.max(stepsA.length, stepsB.length);
  for (let i = 0; i < maxSteps; i++) {
    const sA = stepsA[i];
    const sB = stepsB[i];
    html += `<div class="diff-row">`;
    html += renderDiffCell(sA, sB, 'left', i);
    html += renderDiffCell(sB, sA, 'right', i);
    html += `</div>`;
  }
  html += `</div>`;
  results.innerHTML = html;
}

function deltaCard(label, delta, prefix, higherIsWorse) {
  const sign = delta > 0 ? '+' : '';
  const cls = delta === 0 ? 'neutral' : (higherIsWorse ? (delta > 0 ? 'positive' : 'negative') : (delta > 0 ? 'negative' : 'positive'));
  const formatted = prefix === '$' ? `${sign}$${Math.abs(delta).toFixed(3)}` : `${sign}${delta}`;
  return `<div class="delta-card"><div class="delta-val ${cls}">${formatted}</div><div class="delta-label">${label}</div></div>`;
}

function summaryPanel(title, label, steps, tokens, cost, trust, blocked) {
  return `<div class="summary-side">
    <h3>${escapeHtml(label)}: ${escapeHtml(title)}</h3>
    <div class="summary-row"><span class="label">Steps</span><span class="value">${steps.length}</span></div>
    <div class="summary-row"><span class="label">Tokens</span><span class="value">${typeof tokens === 'number' ? tokens.toLocaleString() : tokens}</span></div>
    <div class="summary-row"><span class="label">Cost</span><span class="value">${typeof cost === 'number' ? '$' + cost.toFixed(3) : cost}</span></div>
    <div class="summary-row"><span class="label">Trust</span><span class="value">${trust != null ? trust : '—'}</span></div>
    <div class="summary-row"><span class="label">Status</span><span class="value ${blocked ? 'worse' : 'better'}">${blocked ? 'BLOCKED' : 'OK'}</span></div>
  </div>`;
}

function renderDiffCell(step, other, side, idx) {
  if (!step && !other) return '<div class="diff-cell same"></div>';
  if (!step) return `<div class="diff-cell removed"><span style="color:#555;">—</span></div>`;

  const action = step.action || step.type || step.event || 'step';
  const detail = step.detail || step.content || step.message || step.input || '';
  const detailStr = typeof detail === 'object' ? JSON.stringify(detail) : String(detail);

  let cls = 'same';
  let badge = '';
  if (!other) {
    cls = side === 'left' ? 'removed' : 'added';
    badge = side === 'left' ? '<span class="cell-badge badge-removed">only in A</span>' : '<span class="cell-badge badge-new">only in B</span>';
  } else {
    const otherAction = other.action || other.type || other.event || 'step';
    const otherDetail = other.detail || other.content || other.message || other.input || '';
    const otherStr = typeof otherDetail === 'object' ? JSON.stringify(otherDetail) : String(otherDetail);
    if (action !== otherAction || detailStr !== otherStr) {
      cls = 'changed';
      badge = '<span class="cell-badge badge-changed">changed</span>';
    }
  }

  return `<div class="diff-cell ${cls}">
    <div class="cell-action">${escapeHtml(action)}${badge}</div>
    ${detailStr ? `<div class="cell-detail">${escapeHtml(detailStr.substring(0, 200))}${detailStr.length > 200 ? '...' : ''}</div>` : ''}
  </div>`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

init();
</script>
</body>
</html>
