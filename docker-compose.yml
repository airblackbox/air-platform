# AIR Platform — Full Stack
# One command to run the AIR Blackbox gateway with its full observability stack:
# Gateway → OTel Collector → Jaeger, plus MinIO as the encrypted prompt vault.
#
# The gateway is pulled as a prebuilt image from GHCR (signed, SLSA provenance
# attached). The collector is built directly from the public repo — no local
# checkouts of other repositories are required.
#
# Usage:
#   cp .env.example .env    # optional: set OPENAI_API_KEY, GATEWAY_KEY
#   docker compose up -d
#   docker compose down -v
#
# Ports:
#   8080  — AIR Gateway (OpenAI-compatible proxy: /v1/chat/completions, /health,
#           /v1/audit, /v1/analytics)
#   9000  — MinIO S3 API (prompt vault)
#   9001  — MinIO Console
#   4317  — OTel Collector gRPC OTLP
#   4318  — OTel Collector HTTP OTLP
#   16686 — Jaeger UI

services:
  # --- Infrastructure ---
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
       mc mb -p local/air-runs || true &&
       echo 'MinIO bucket ready'"

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"
      - "14250:14250"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  # --- Core Services ---
  gateway:
    image: ghcr.io/airblackbox/airblackbox:latest
    ports:
      - "8080:8080"
    environment:
      LISTEN_ADDR: ":8080"
      PROVIDER_URL: ${PROVIDER_URL:-https://api.openai.com}
      VAULT_ENDPOINT: "minio:9000"
      VAULT_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      VAULT_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      VAULT_BUCKET: "air-runs"
      VAULT_USE_SSL: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "collector:4317"
      RUNS_DIR: "/data/runs"
      GUARDRAILS_CONFIG: "/app/guardrails.yaml"
      # When unset, the gateway generates a signing key and persists it as
      # .air-signing-key inside RUNS_DIR (survives restarts via the volume).
      TRUST_SIGNING_KEY: ${TRUST_SIGNING_KEY:-}
      GATEWAY_KEY: ${GATEWAY_KEY:-}
    volumes:
      - ./runs:/data/runs
      - ./guardrails.yaml:/app/guardrails.yaml:ro
    # No depends_on for minio: the gateway starts and proxies even if the
    # vault is temporarily unreachable — it can never block your AI system.
    depends_on:
      minio-init:
        condition: service_completed_successfully
      collector:
        condition: service_started

  collector:
    build:
      context: https://github.com/airblackbox/airblackbox.git#main:collector
      dockerfile: Dockerfile
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - vault-data:/data/vault
      # Local pipeline config (overrides the image's baked-in config)
      - ./collector.yaml:/etc/otel/collector.yaml:ro
    depends_on:
      - jaeger

volumes:
  minio-data:
  vault-data:
